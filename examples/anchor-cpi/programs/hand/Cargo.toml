[package]
name = "hand"
version = "0.1.0"
edition = "2021"
publish = false

[features]
logging = []

[lib]
crate-type = ["cdylib"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(target_os, values("solana"))',
] }


[dependencies]
wincode = { version = "0.4.5", default-features = false, features = ["derive"] }
bytemuck = { version = "1.24.0", features = ["min_const_generics"] }
typhoon = { path = "../../../../crates/lib", features = ["wincode"] }
